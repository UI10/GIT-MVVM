name: "GIT+MVVM"
options:
  bundleIdPrefix: com.github-explorer
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  "GIT+MVVM":
    type: application
    platform: iOS
    sources:
      - Domain
      - Networking
      - API_Infra
      - Persistence
      - Presentation
      - UI
      - App
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.github-explorer.app
        CODE_SIGN_STYLE: Automatic
  "GIT+MVVMTests":
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: "GIT+MVVM"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.github-explorer.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GIT+MVVM.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GIT+MVVM"
        BUNDLE_LOADER: "$(TEST_HOST)"
